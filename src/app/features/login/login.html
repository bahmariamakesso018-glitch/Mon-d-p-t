<div class="login-container">
  <h2>Connexion</h2>
  <p>Accédez à votre espace AfriHealth</p>

  <form (ngSubmit)="onLogin()">
    <div class="form-group">
      <input type="text" [(ngModel)]="username" name="username" placeholder="Nom d'utilisateur" required>
    </div>

    <div class="form-group">
      <input type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe" required>
    </div>

    <button type="submit" [disabled]="!username || !password">Se connecter</button>
  </form>

  <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="footer-links">
    <p>Vous n'avez pas de compte ? <a routerLink="/register">Inscrivez-vous</a></p>
  </div>
</div>
