<div class="register-container">

  <h2>Inscription</h2>

  <!-- Choix du rôle -->
  <div class="role-selection">
    <button (click)="selectRole('patient')" 
            [class.active]="role === 'patient'">
      Patient
    </button>

    <button (click)="selectRole('doctor')" 
            [class.active]="role === 'doctor'">
      Docteur
    </button>
  </div>

  <!-- Formulaire -->
  <form (ngSubmit)="onRegister()">

    <input type="text" [(ngModel)]="username" name="username" placeholder="Nom d'utilisateur" required>

<input type="email" [(ngModel)]="email" name="email" placeholder="email@gmail.com" required>

<input type="date" [(ngModel)]="birthDate" name="birthDate" required>

<input type="text" [(ngModel)]="birthPlace" name="birthPlace" placeholder="Lieu de naissance" required>

<input type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe" required>

<input type="text" [(ngModel)]="phone" name="phone_number" placeholder="Téléphone" required>
    <!-- Spécialité seulement pour docteur -->
    <input *ngIf="role === 'doctor'" type="text"
           [(ngModel)]="specialty"
           name="specialty"
           placeholder="Spécialité">

    <button type="submit">S'inscrire</button>

  </form>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    
</div>
  <div class="footer">
        © 2026 Plateforme Santé Communautaire
    </div>
